version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: unity_provider_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: unity_provider
      POSTGRES_USER: unity_user
      POSTGRES_PASSWORD: Unity12345
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: